<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Strangeness Tracker 1984</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar no-print">
      <div>
        <h1>Strangeness Tracker 1984</h1>
        <p class="subtitle">Mobile-first TMNT &amp; Other Strangeness character builder and live sheet</p>
      </div>
      <div class="topbar-actions">
        <button id="nav-home" class="btn btn-ghost">Home</button>
        <button id="nav-builder" class="btn btn-ghost">New</button>
        <button id="nav-library" class="btn btn-ghost">Library</button>
        <button id="open-dice" class="btn btn-ghost">Dice</button>
      </div>
    </header>

    <main id="app"></main>
  </div>

  <dialog id="modal"></dialog>

  <input type="file" id="import-character-file" accept="application/json,.json" hidden />
  <input type="file" id="import-library-file" accept="application/json,.json" hidden />

  <script type="module" src="./js/main.js"></script>
</body>
</html>
